version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: blackincode_db
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: billing
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: blackincode_backend
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgres://root:password@db:5432/billing
      - JWT_SECRET=super-secret-jwt-key
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: blackincode_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
